name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
      - name: Clone and build sdk-addon-dataset-runtime (pnpm file:../ dependency)
        run: |
          git clone --depth 1 https://github.com/sanity-labs/sdk-addon-dataset-runtime.git "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          cd "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          pnpm install --frozen-lockfile
          pnpm build
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
      - name: Clone and build sdk-addon-dataset-runtime (pnpm file:../ dependency)
        run: |
          git clone --depth 1 https://github.com/sanity-labs/sdk-addon-dataset-runtime.git "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          cd "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          pnpm install --frozen-lockfile
          pnpm build
      - run: pnpm install --frozen-lockfile
      - run: pnpm build

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1
      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm
      - name: Clone and build sdk-addon-dataset-runtime (pnpm file:../ dependency)
        run: |
          git clone --depth 1 https://github.com/sanity-labs/sdk-addon-dataset-runtime.git "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          cd "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          pnpm install --frozen-lockfile
          pnpm build
      - run: pnpm install --frozen-lockfile
      - run: pnpm test --if-present
