name: Setup a new npm package with Trusted Publishing

on:
  workflow_dispatch:
    inputs:
      package:
        description: The package name, for example @sanity-labs/sdk-comments
        required: true

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_PUBLISH_TOKEN }}" > ~/.npmrc

      - name: Print trusted publishing instructions
        run: |
          echo "📦 Package ${{ inputs.package }} must already exist on npm."
          echo ""
          echo "After the first manual publish, configure trusted publishing locally with npm >= 11.10.0:"
          echo ""
          echo "npm trust github ${{ inputs.package }} --file=.github/workflows/release.yml --repository=sanity-labs/${GITHUB_REPOSITORY#*/}"
          echo ""
          echo "If the repository is private during bootstrap, publish manually with provenance disabled."
