name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  id-token: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.0
          cache: pnpm

      - name: Clone and build sdk-addon-dataset-runtime (pnpm file:../ dependency)
        run: |
          git clone --depth 1 https://github.com/sanity-labs/sdk-addon-dataset-runtime.git "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          cd "${GITHUB_WORKSPACE}/../sdk-addon-dataset-runtime"
          pnpm install --frozen-lockfile
          pnpm build

      - run: pnpm install --frozen-lockfile
      - run: pnpm build
      - run: pnpm test --if-present

      - uses: changesets/action@v1
        with:
          version: pnpm changeset version
          publish: pnpm exec changeset publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
